<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Geometrie Clasa 8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>📐 Test Geometrie Clasa VIII</h2>
    
    <div id="nume-section">
        <p>Introdu numele tău și alege categoria de întrebări:</p>
        <input type="text" id="username" placeholder="Nume Prenume...">
        <div id="category-selection" style="margin-top: 12px;"></div>
        <button id="start-quiz" style="margin-top: 10px; padding: 10px 16px;">Începe Quiz</button>
    </div>

    <div id="quiz-section" style="display:none;">
        <div id="question-container">
            <p class="question" id="q-category"></p>
            <p class="question" id="q-text"></p>
            <button id="hint-btn" style="margin: 10px 0; padding: 8px 16px; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;">Hint</button>
            <div id="hint-text" style="display:none; margin: 10px 0; padding: 10px; background: #e8f4fd; border-left: 4px solid #667eea; font-style: italic;"></div>
            <div class="options" id="q-options"></div>
            <div id="solution-section" style="margin: 15px 0; padding: 15px; background: #f5f5f5; border-radius: 8px;">
                <p style="margin: 0 0 10px 0; font-weight: 600; color: #333;">📸 Încarcă rezolvarea (dacă este necesar):</p>
                <input type="file" id="solution-image" accept="image/*" style="margin-bottom: 10px;">
                <img id="preview-image" style="display:none; max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 10px;">
            </div>
            <div id="explanation" style="display:none; margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 0.9em;"></div>
        </div>
    </div>

    <div id="result-section" style="display:none;">
        <h3>Felicitări!</h3>
        <p id="final-score"></p>
        <button id="restart-quiz" style="margin-top: 20px; padding: 15px 30px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; border-radius: 25px; font-size: 1.1em; cursor: pointer; transition: all 0.3s ease;">Începe un nou test</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="script.js"></script>
</body>
</html>
