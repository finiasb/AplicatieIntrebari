<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Profesor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>📊 Catalog Rezultate - Geometrie</h2>
    <div id="student-buttons" style="margin-bottom: 20px;"></div>
    <div id="student-table" style="display:none;">
        <table id="tabel-scoruri">
            <thead>
                <tr>
                    <th>Nume Elev</th>
                    <th>Scor</th>
                    <th>Categorii</th>
                    <th>Data Completării</th>
                </tr>
            </thead>
            <tbody id="lista-elevi"></tbody>
        </table>

        <h3 id="detail-title" style="display:none; margin-top: 30px;">Detalii completare</h3>
        <table id="tabel-detalii" style="display:none; margin-top: 10px;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Întrebare</th>
                    <th>Categorie</th>
                    <th>Răspuns elev</th>
                    <th>Răspuns corect</th>
                    <th>Corect</th>
                    <th>Hint folosit</th>
                    <th>Rezolvare</th>
                </tr>
            </thead>
            <tbody id="lista-detalii"></tbody>
        </table>
        <div id="image-modal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
            <img id="modal-image" style="max-width: 90%; max-height: 90%;">
            <button onclick="document.getElementById('image-modal').style.display='none';" style="position: absolute; top: 20px; right: 20px; padding: 10px 20px; background: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em;">Închide</button>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="script.js"></script>
</body>
</html>
